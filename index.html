<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더사가 견적 시스템 (최종 + 출력/공유)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{font-family:Arial;margin:20px}
img{max-width:80px}
button{padding:8px 12px;margin:5px}
.table{border-collapse:collapse;width:100%}
.table td,.table th{border:1px solid #ccc;padding:6px;text-align:center}
#preview{background:#fff;padding:20px}
</style>
</head>

<body>
<h2>견적 시스템 (최종 완성)</h2>

<input type="text" id="search" placeholder="품명 검색">
<button onclick="render()">조회</button>

<div id="result"></div>
<hr>
<h3>견적 리스트</h3>
<table class="table">
<thead>
<tr><th>품명</th><th>이미지</th><th>수량</th><th>단가</th><th>금액</th></tr>
</thead>
<tbody id="quoteBody"></tbody>
</table>

<button onclick="showPreview()">견적서생성</button>
<button onclick="saveImage()">이미지저장</button>
<button onclick="shareImage()">이미지공유</button>

<hr>
<div id="preview"></div>

<script src="thesaga_data.js"></script>
<script>

const CDN_BASE = "https://cdn.jsdelivr.net/gh/oisco00/thesaga@main/";
const IMAGE_FOLDERS = ["images1","images2","images3","images4"];

function getCandidates(name){
  return IMAGE_FOLDERS.map(f => `${CDN_BASE}${f}/${name}`);
}

function imgTag(name){
  const list = getCandidates(name);
  return `<img src="${list[0]}" data-list='${JSON.stringify(list)}' data-idx="0">`;
}

function applyFallback(root=document){
  root.querySelectorAll("img[data-list]").forEach(img=>{
    const list = JSON.parse(img.dataset.list);
    img.onerror = function(){
      let i = Number(this.dataset.idx)+1;
      if(i < list.length){
        this.dataset.idx = i;
        this.src = list[i];
      }else{
        this.style.display='none';
      }
    }
  });
}

function render(){
  const keyword = document.getElementById("search").value;
  let html = "";

  data.filter(d=>!keyword || (d["품명"]||"").includes(keyword))
      .slice(0,20)
      .forEach(item=>{

    const name = item["이미지명"] || "";

    html += `
    <div>
      <b>${item["품명"]}</b><br>
      ${name ? imgTag(name) : "이미지 없음"}<br>
      <button onclick='addToQuote(${JSON.stringify(item)})'>추가</button>
    </div>
    <hr>`;
  });

  document.getElementById("result").innerHTML = html;
  applyFallback(document.getElementById("result"));
}

function addToQuote(item){
  const tbody = document.getElementById("quoteBody");

  const tr = document.createElement("tr");

  const imgName = item["이미지명"] || "";
  const price = Number(item["단가"] || 0);

  tr.innerHTML = `
    <td>${item["품명"]}</td>
    <td>${imgName ? imgTag(imgName) : ""}</td>
    <td><input type="number" value="1" min="1" onchange="updateRow(this)"></td>
    <td>${price.toLocaleString()}</td>
    <td class="amount">${price.toLocaleString()}</td>
  `;

  tbody.appendChild(tr);
  applyFallback(tr);
}

function updateRow(input){
  const tr = input.closest("tr");
  const qty = Number(input.value);
  const price = Number(tr.children[3].innerText.replace(/,/g,""));
  const amt = qty * price;
  tr.querySelector(".amount").innerText = amt.toLocaleString();
}

function showPreview(){
  const rows = document.querySelectorAll("#quoteBody tr");
  let total = 0;
  let html = `<div id='printArea'><h2 style='text-align:center'>견 적 서</h2><table class='table'>`;

  rows.forEach(r=>{
    const name = r.children[0].innerText;
    const price = r.children[3].innerText;
    const amt = r.children[4].innerText;
    total += Number(amt.replace(/,/g,""));

    html += `<tr><td>${name}</td><td>${price}</td><td>${amt}</td></tr>`;
  });

  html += `</table><h3>합계: ${total.toLocaleString()}</h3></div>`;

  document.getElementById("preview").innerHTML = html;
}

function saveImage(){
  html2canvas(document.getElementById("printArea")).then(canvas=>{
    const link = document.createElement("a");
    link.download = "견적서.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

function shareImage(){
  html2canvas(document.getElementById("printArea")).then(canvas=>{
    canvas.toBlob(blob=>{
      const file = new File([blob], "견적서.png", {type:"image/png"});

      if(navigator.share){
        navigator.share({
          files:[file],
          title:"견적서",
          text:"견적서 공유"
        });
      }else{
        alert("공유 미지원 기기");
      }
    });
  });
}

</script>
</body>
</html>
