<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>(주)더사가 견적 시스템</title>
<script src="./thesaga_data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  *{box-sizing:border-box}
  body{font-family:"Malgun Gothic",Arial,sans-serif;margin:0;background:#f4f6f8;color:#222}
  .wrap{max-width:1360px;margin:0 auto;padding:24px}
  .title{font-size:38px;font-weight:800;margin:0 0 18px}
  .toolbar,.panel{background:#fff;border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  .toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:end;padding:18px}
  .field{display:flex;flex-direction:column;gap:6px;min-width:210px}
  .field label{font-size:14px;color:#5c6670}
  select,input,button{font-size:18px;padding:11px 12px;border:1px solid #ccd3dc;border-radius:10px}
  select:disabled{background:#f1f3f5;color:#8b929b}
  button{cursor:pointer;border:none;background:#0b57d0;color:#fff;font-weight:700}
  button.secondary{background:#2e7d32}
  button.gray{background:#6c757d}
  button.share{background:#f9a825;color:#111}
  .tip{font-size:14px;color:#666;margin-top:8px}
  .panel{margin-top:18px;padding:18px}
  .result{display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:start}
  .imgbox{width:100%;height:240px;border:1px solid #d8dee6;border-radius:14px;display:flex;align-items:center;justify-content:center;background:#fff}
  .result img{max-width:100%;max-height:220px;object-fit:contain}
  .meta{font-size:18px;line-height:1.9}
  .meta strong{display:inline-block;width:96px}
  table{width:100%;border-collapse:collapse;margin-top:10px}
  th,td{border:1px solid #d9dde4;padding:9px;text-align:center;font-size:15px}
  th{background:#f0f3f7}
  td img{width:70px;height:70px;object-fit:contain}
  .actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:14px}
  .sum{font-size:22px;font-weight:800;text-align:right;margin-top:14px}
  .empty{color:#8a8f98}
  @media (max-width: 900px){
    .title{font-size:30px}
    .result{grid-template-columns:1fr}
    .field{min-width:100%}
    th,td{font-size:13px;padding:7px}
    td img{width:54px;height:54px}
    select,input,button{font-size:16px}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">(주)더사가 견적 시스템</h1>

  <div class="toolbar">
    <div class="field">
      <label>분류 (필수)</label>
      <select id="category"><option value="">선택</option></select>
    </div>
    <div class="field">
      <label>규격</label>
      <select id="spec" disabled><option value="">선택</option></select>
    </div>
    <div class="field">
      <label>모델</label>
      <select id="model" disabled><option value="">선택</option></select>
    </div>
    <div class="field" style="min-width:260px">
      <label>견적서 수신처</label>
      <input type="text" id="receiver" placeholder="예: ○○학교장 / 홍길동 귀하" />
    </div>
    <div class="field" style="min-width:120px">
      <label>&nbsp;</label>
      <button id="searchBtn">조회</button>
    </div>
    <div class="field" style="min-width:120px">
      <label>&nbsp;</label>
      <button class="gray" id="resetBtn">초기화</button>
    </div>
  </div>
  <div class="tip">분류는 필수입니다. 규격과 모델은 순서 없이 하나를 먼저 선택할 수 있습니다. 한 가지 품목으로 좁혀지면 자동 표시됩니다.</div>

  <div class="panel">
    <h2 style="margin-top:0">조회 결과</h2>
    <div id="resultBox" class="empty">분류를 먼저 선택하세요.</div>
  </div>

  <div class="panel">
    <h2 style="margin-top:0">견적 리스트</h2>
    <table id="quoteTable">
      <thead>
        <tr>
          <th>이미지</th>
          <th>분류</th>
          <th>품명</th>
          <th>모델</th>
          <th>규격</th>
          <th>식별번호</th>
          <th>단가</th>
          <th>수량</th>
          <th>금액</th>
          <th>삭제</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="sum" id="grandTotal">합계: 0원</div>
    <div class="actions">
      <button class="secondary" id="quoteBtn">견적서 생성</button>
      <button class="share" id="shareBtn">PDF 공유</button>
    </div>
  </div>
</div>

<script>
const data = Array.isArray(window.THESAGA_DATA) ? window.THESAGA_DATA.filter(x => x && (x["분류"] || x["모델명"] || x["규격"])) : [];
const categorySel = document.getElementById('category');
const specSel = document.getElementById('spec');
const modelSel = document.getElementById('model');
const receiverInput = document.getElementById('receiver');
const resultBox = document.getElementById('resultBox');
const quoteBody = document.querySelector('#quoteTable tbody');

function num(v){ if(v===null||v===undefined||v==='') return 0; const s=String(v).replace(/[^0-9.-]/g,''); return s ? Number(s) : 0; }
function money(v){ return num(v).toLocaleString('ko-KR') + '원'; }
function uniq(arr){ return [...new Set(arr.filter(v => v !== null && v !== undefined && String(v).trim() !== ''))].sort(); }
function fillSelect(sel, values){
  sel.innerHTML = '<option value="">선택</option>';
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = String(v);
    opt.textContent = String(v);
    sel.appendChild(opt);
  });
}
function getFilteredBase(){
  const c = categorySel.value;
  if(!c) return [];
  return data.filter(x => x["분류"] === c);
}
function refreshDependent(changedBy=''){
  const c = categorySel.value;
  if(!c){
    specSel.disabled = true; modelSel.disabled = true;
    fillSelect(specSel, []); fillSelect(modelSel, []);
    resultBox.innerHTML = '<div class="empty">분류를 먼저 선택하세요.</div>';
    return;
  }
  specSel.disabled = false; modelSel.disabled = false;

  const base = getFilteredBase();
  const currentSpec = specSel.value;
  const currentModel = modelSel.value;

  let specSource = base;
  let modelSource = base;

  if(currentModel){
    specSource = base.filter(x => String(x["모델명"] || '') === currentModel);
  }
  if(currentSpec){
    modelSource = base.filter(x => String(x["규격"] || '') === currentSpec);
  }

  const specOptions = uniq(specSource.map(x => String(x["규격"] || '')));
  const modelOptions = uniq(modelSource.map(x => String(x["모델명"] || '')));

  fillSelect(specSel, specOptions);
  fillSelect(modelSel, modelOptions);

  if(currentSpec && specOptions.includes(currentSpec)) specSel.value = currentSpec;
  if(currentModel && modelOptions.includes(currentModel)) modelSel.value = currentModel;

  if(changedBy === 'model' && specOptions.length === 1){
    specSel.value = specOptions[0];
  }
  if(changedBy === 'spec' && modelOptions.length === 1){
    modelSel.value = modelOptions[0];
  }
  autoDisplayIfSingle();
}
function getMatches(){
  const c = categorySel.value;
  const s = specSel.value;
  const m = modelSel.value;
  if(!c) return [];
  return data.filter(x =>
    x["분류"] === c &&
    (!s || String(x["규격"] || '') === s) &&
    (!m || String(x["모델명"] || '') === m)
  );
}
function renderResult(item){
  if(!item){
    resultBox.innerHTML = '<div class="empty">조건에 맞는 품목이 없습니다. 분류를 선택한 뒤 규격 또는 모델 중 하나를 선택해 주세요.</div>';
    return;
  }
  const imgName = item["이미지명"] || '';
  const imgPath = imgName ? `images/${imgName}` : '';
  resultBox.innerHTML = `
    <div class="result">
      <div class="imgbox">${imgPath ? `<img src="${imgPath}" onerror="this.style.display='none'">` : '<div class="empty">이미지 없음</div>'}</div>
      <div class="meta">
        <div><strong>분류</strong> ${item["분류"] || ''}</div>
        <div><strong>품명</strong> ${item["품명"] || ''}</div>
        <div><strong>모델</strong> ${item["모델명"] || ''}</div>
        <div><strong>규격</strong> ${item["규격"] || ''}</div>
        <div><strong>식별번호</strong> ${item["식별번호"] || ''}</div>
        <div><strong>단가</strong> ${money(item["가격(원)"])}</div>
        <div style="margin-top:14px"><button onclick='addQuoteByCurrent()'>견적 리스트에 추가</button></div>
      </div>
    </div>
  `;
}
function autoDisplayIfSingle(){
  const matches = getMatches();
  if(matches.length === 1){
    renderResult(matches[0]);
  } else if(matches.length === 0 && categorySel.value){
    resultBox.innerHTML = '<div class="empty">조건에 맞는 품목이 없습니다.</div>';
  } else if(matches.length > 1){
    resultBox.innerHTML = `<div class="empty">현재 조건으로 ${matches.length}건이 조회됩니다. 규격 또는 모델을 더 선택한 뒤 조회를 누르세요.</div>`;
  }
}
function searchProduct(){
  if(!categorySel.value){
    alert('분류는 반드시 선택해야 합니다.');
    categorySel.focus();
    return;
  }
  const matches = getMatches();
  if(matches.length === 0){
    renderResult(null);
  } else if(matches.length === 1){
    renderResult(matches[0]);
  } else {
    alert(`조건에 맞는 품목이 ${matches.length}건입니다. 규격 또는 모델을 추가로 선택해 주세요.`);
  }
}
function addQuoteByCurrent(){
  const matches = getMatches();
  if(matches.length === 1){
    addToQuote(matches[0]);
  } else {
    alert('하나의 품목으로 좁혀진 뒤 추가할 수 있습니다.');
  }
}
window.addQuoteByCurrent = addQuoteByCurrent;

function addToQuote(item){
  const key = String(item["식별번호"] || item["모델명"] || Math.random());
  const existed = [...quoteBody.querySelectorAll('tr')].find(tr => tr.dataset.key === key);
  if(existed){
    const qtyInput = existed.querySelector('.qty');
    qtyInput.value = num(qtyInput.value) + 1;
    recalcRow(existed);
    return;
  }
  const tr = document.createElement('tr');
  tr.dataset.key = key;
  const imgName = item["이미지명"] || '';
  const imgPath = imgName ? `images/${imgName}` : '';
  const price = num(item["가격(원)"]);
  tr.innerHTML = `
    <td>${imgPath ? `<img src="${imgPath}" onerror="this.style.display='none'">` : ''}</td>
    <td>${item["분류"] || ''}</td>
    <td>${item["품명"] || ''}</td>
    <td>${item["모델명"] || ''}</td>
    <td>${item["규격"] || ''}</td>
    <td>${item["식별번호"] || ''}</td>
    <td class="price" data-price="${price}">${money(price)}</td>
    <td><input class="qty" type="number" min="1" value="1" style="width:80px"></td>
    <td class="amount">${money(price)}</td>
    <td><button type="button" onclick="removeRow(this)" style="background:#c62828">삭제</button></td>
  `;
  tr.querySelector('.qty').addEventListener('input', () => recalcRow(tr));
  quoteBody.appendChild(tr);
  recalcRow(tr);
}
window.removeRow = function(btn){
  btn.closest('tr').remove();
  recalcTotal();
}
function recalcRow(tr){
  const price = num(tr.querySelector('.price').dataset.price);
  const qty = Math.max(1, num(tr.querySelector('.qty').value));
  tr.querySelector('.qty').value = qty;
  tr.querySelector('.amount').textContent = money(price * qty);
  recalcTotal();
}
function recalcTotal(){
  let total = 0;
  [...quoteBody.querySelectorAll('tr')].forEach(tr => {
    total += num(tr.querySelector('.price').dataset.price) * num(tr.querySelector('.qty').value);
  });
  document.getElementById('grandTotal').textContent = `합계: ${money(total)}`;
}

function buildQuoteInnerHTML(){
  const rows = [...quoteBody.querySelectorAll('tr')];
  if(rows.length === 0) return '';
  const today = new Date();
  const dateStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  const total = rows.reduce((sum,tr)=>sum + num(tr.querySelector('.price').dataset.price) * num(tr.querySelector('.qty').value),0);
  const receiver = (receiverInput.value || '').trim();

  let itemRows = '';
  rows.forEach((tr, idx) => {
    const img = tr.querySelector('img');
    const imgSrc = img ? img.src : '';
    const c = tr.children;
    itemRows += `
      <tr>
        <td>${idx+1}</td>
        <td style="text-align:left">${c[2].textContent}</td>
        <td>${imgSrc ? `<img src="${imgSrc}" style="width:52px;height:52px;object-fit:contain">` : ''}</td>
        <td>${c[4].textContent}</td>
        <td>${tr.querySelector('.qty').value}</td>
        <td>${c[6].textContent}</td>
        <td>${c[8].textContent}</td>
      </tr>
    `;
  });
  for(let i=rows.length; i<11; i++){
    itemRows += `<tr><td>${i+1}</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`;
  }

  return `
  <div class="quote-root">
    <div class="quote-title">[ 견 적 서 ]</div>
    <div class="quote-date">일자 : ${dateStr}</div>

    <div class="quote-top">
      <div class="buyer-box box">
        <div>${receiver ? receiver + '<br>' : ''}귀하</div>
        <div style="font-size:14px">아래와 같이 견적합니다.</div>
      </div>
      <div class="box">
        <table class="seller-table">
          <tr><th style="width:90px">상 호</th><td>(주)더사가</td><th style="width:90px">사업자번호</th><td>515-81-11705</td></tr>
          <tr><th>대 표</th><td>구 광 회</td><th>종 목</th><td>금속가구 외</td></tr>
          <tr><th>업 태</th><td>제조업</td><th>업 종</th><td>조달 / 가구</td></tr>
          <tr><th>주 소</th><td colspan="3">경상북도 경산시 진량읍 일연로 502-13</td></tr>
          <tr><th>연락처</th><td colspan="3">TEL : 053-852-2033  FAX : 053-852-2034</td></tr>
          <tr><th>E-MAIL</th><td colspan="3">thesaga2020@naver.com</td></tr>
        </table>
      </div>
    </div>

    <div class="quote-desc">
      <div><strong>견 적 명</strong> 조달 물품 견적</div>
      <div><strong>일 자</strong> ${dateStr}</div>
    </div>

    <div class="amount-bar">합계금액 : ${money(total)} 정 (부가세 포함가)</div>

    <table class="quote-table">
      <thead>
        <tr>
          <th style="width:48px">순번</th>
          <th>품명</th>
          <th style="width:92px">이미지</th>
          <th style="width:180px">규격</th>
          <th style="width:70px">수량</th>
          <th style="width:110px">단가</th>
          <th style="width:120px">금액</th>
        </tr>
      </thead>
      <tbody>${itemRows}</tbody>
    </table>

    <div class="quote-total">합 계 : ${money(total)}</div>
    <div class="foot">※ 견적 유효기간 : 견적일로부터 30일</div>
  </div>`;
}

function getQuoteStyles(){
  return `
  <style>
    .quote-root{font-family:"Malgun Gothic",Arial,sans-serif;color:#000;background:#fff;padding:18px;width:794px;margin:0 auto}
    .quote-title{font-size:30px;font-weight:800;text-align:center;border:2px solid #000;padding:10px 0;margin-bottom:8px}
    .quote-date{text-align:right;font-size:14px;margin-bottom:8px}
    .quote-top{display:grid;grid-template-columns:1fr 1.35fr;gap:10px;margin-bottom:10px}
    .box{border:1px solid #000}
    .buyer-box{height:180px;padding:14px;font-size:18px;display:flex;flex-direction:column;justify-content:space-between}
    .seller-table{width:100%;border-collapse:collapse;margin-top:0}
    .seller-table td,.seller-table th{border:1px solid #000;padding:6px 8px;font-size:13px;text-align:left}
    .quote-desc{display:grid;grid-template-columns:1fr 1fr;border:1px solid #000;margin-bottom:8px}
    .quote-desc div{padding:8px 10px;font-size:14px;border-right:1px solid #000}
    .quote-desc div:last-child{border-right:none}
    .amount-bar{border:2px solid #000;font-size:18px;font-weight:800;padding:8px 10px;margin-bottom:10px}
    .quote-table{width:100%;border-collapse:collapse;margin-top:0}
    .quote-table th,.quote-table td{border:1px solid #000;padding:6px 5px;font-size:12px;text-align:center}
    .quote-table th{background:#f1f1f1}
    .quote-total{margin-top:8px;border:2px solid #000;padding:10px 12px;text-align:right;font-size:18px;font-weight:800}
    .foot{margin-top:12px;font-size:12px;color:#444}
    .quote-root img{display:block;margin:0 auto}
  </style>`;
}

function buildQuoteHTMLDocument(){
  const inner = buildQuoteInnerHTML();
  if(!inner) return '';
  return `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>(주)더사가 견적서</title>${getQuoteStyles()}<style>@page{size:A4 portrait;margin:10mm} body{margin:0;background:#fff}</style></head><body>${inner}</body></html>`;
}

async function createQuotePdfBlob(){
  const inner = buildQuoteInnerHTML();
  if(!inner){
    alert('견적 리스트가 비어 있습니다.');
    return null;
  }

  const wrapper = document.createElement('div');
  wrapper.style.position = 'fixed';
  wrapper.style.left = '-100000px';
  wrapper.style.top = '0';
  wrapper.style.width = '794px';
  wrapper.style.background = '#fff';
  wrapper.innerHTML = getQuoteStyles() + inner;
  document.body.appendChild(wrapper);

  try {
    const opt = {
      margin: [5, 5, 5, 5],
      filename: `더사가_견적서_${new Date().toISOString().slice(0,10)}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff', scrollY: 0 },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    return await html2pdf().set(opt).from(wrapper).outputPdf('blob');
  } catch(err) {
    console.error(err);
    alert('PDF 생성 중 오류가 발생했습니다. 인터넷 연결 상태와 이미지 파일 경로를 확인해 주세요.');
    return null;
  } finally {
    wrapper.remove();
  }
}

function generateQuotePrint(){
  const html = buildQuoteHTMLDocument();
  if(!html){
    alert('견적 리스트가 비어 있습니다.');
    return;
  }
  const win = window.open('', '_blank', 'width=1000,height=1200');
  if(!win){
    alert('팝업이 차단되었습니다. 팝업 허용 후 다시 시도해 주세요.');
    return;
  }
  win.document.open();
  win.document.write(html);
  win.document.close();
  win.focus();
}

async function shareQuote(){
  const pdfBlob = await createQuotePdfBlob();
  if(!pdfBlob) return;

  if(pdfBlob.size < 1000){
    alert('PDF 파일이 비어 있습니다. 이미지 경로나 견적 데이터 상태를 다시 확인해 주세요.');
    return;
  }

  const fileName = `더사가_견적서_${new Date().toISOString().slice(0,10)}.pdf`;
  const file = new File([pdfBlob], fileName, { type: 'application/pdf' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        title: '(주)더사가 견적서',
        text: '(주)더사가 견적서입니다.',
        files: [file]
      });
      return;
    } catch (err) {
      if (err && err.name !== 'AbortError') console.error(err);
    }
  }

  const pdfUrl = URL.createObjectURL(pdfBlob);
  const a = document.createElement('a');
  a.href = pdfUrl;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(pdfUrl), 60000);
  alert('이 기기에서는 바로 공유가 제한되어 PDF 파일로 다운로드했습니다. 다운로드된 파일을 카카오톡에 첨부해 보내세요.');
}

function resetAll(){
  categorySel.value = '';
  fillSelect(specSel, []);
  fillSelect(modelSel, []);
  specSel.disabled = true;
  modelSel.disabled = true;
  receiverInput.value = '';
  resultBox.innerHTML = '<div class="empty">분류를 먼저 선택하세요.</div>';
  quoteBody.innerHTML = '';
  recalcTotal();
}

function initCategory(){
  const categories = uniq(data.map(x => x["분류"]));
  fillSelect(categorySel, categories);
}

categorySel.addEventListener('change', () => {
  specSel.value = '';
  modelSel.value = '';
  refreshDependent('category');
});
specSel.addEventListener('change', () => refreshDependent('spec'));
modelSel.addEventListener('change', () => refreshDependent('model'));
document.getElementById('searchBtn').addEventListener('click', searchProduct);
document.getElementById('resetBtn').addEventListener('click', resetAll);
document.getElementById('quoteBtn').addEventListener('click', generateQuotePrint);
document.getElementById('shareBtn').addEventListener('click', shareQuote);
initCategory();
</script>
</body>
</html>
