<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>(주)더사가 견적 시스템 - 모바일 보완판</title>
<script src="./thesaga_data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  *{box-sizing:border-box}
  :root{
    --outer: 2.2px;
    --inner: 1px;
    --lav: #d8cfe2;
    --neg: #c62828;
    --blue: #0b57d0;
    --green: #2e7d32;
    --gray: #6c757d;
    --orange: #ef6c00;
    --panel-radius: 18px;
  }

  body{font-family:"Malgun Gothic",Arial,sans-serif;margin:0;background:#f4f6f8;color:#222}
  body.modal-open{overflow:hidden;touch-action:none}
  .wrap{max-width:1360px;margin:0 auto;padding:24px}
  .title{font-size:38px;font-weight:800;margin:0 0 18px}
  .toolbar,.panel{background:#fff;border-radius:var(--panel-radius);box-shadow:0 2px 10px rgba(0,0,0,.06)}
  .toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:end;padding:18px}
  .panel{margin-top:12px;padding:18px}
  .field{display:flex;flex-direction:column;gap:6px;min-width:180px;flex:1 1 180px}
  .field label{font-size:14px;color:#5c6670}
  .field > select,
  .field > input,
  .field > button,
  .field > textarea{width:100%}
  select,input,button,textarea{font-size:18px;padding:11px 12px;border:1px solid #ccd3dc;border-radius:10px}
  textarea{resize:vertical;min-height:88px}
  select:disabled{background:#f1f3f5;color:#8b929b}
  button{cursor:pointer;border:none;background:var(--blue);color:#fff;font-weight:700}
  button.secondary{background:var(--green)}
  button.gray{background:var(--gray)}
  button.orange{background:var(--orange)}
  button.red{background:#c62828}
  h2{word-break:keep-all}
  .result{display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:start}
  .imgbox{width:100%;height:240px;border:1px solid #d8dee6;border-radius:14px;display:flex;align-items:center;justify-content:center;background:#fff}
  .result img{max-width:100%;max-height:220px;object-fit:contain}
  .meta{font-size:18px;line-height:1.9}
  .meta strong{display:inline-block;width:96px}
  .empty{color:#8a8f98}

  .table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px}
  table{width:100%;border-collapse:collapse;margin-top:10px}
  th,td{border:1px solid #d9dde4;padding:9px;text-align:center;font-size:15px;vertical-align:middle}
  th{background:#f0f3f7}
  td img{width:70px;height:70px;object-fit:contain}
  .quote-thumb{width:70px;height:70px;object-fit:contain}
  .inline-input{width:100%;min-width:92px;padding:8px 10px;font-size:15px}
  .quote-controls{display:flex;gap:12px;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-top:14px}
  .sum{font-size:22px;font-weight:800;text-align:right;flex:1 1 520px}
  .misc-help{font-size:13px;color:#5f6873;margin-top:8px}
  .actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:14px}
  .actions button{min-width:140px}

  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;padding:12px}
  .modal.show{display:flex;align-items:center;justify-content:center}
  .modal-box{width:min(1040px,100%);max-height:calc(100vh - 24px);background:#fff;border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #e0e0e0;background:#fff;gap:10px}
  .modal-title{font-size:20px;font-weight:800}
  .modal-actions{display:flex;gap:8px;flex-wrap:wrap}
  .modal-body{flex:1;background:#dfe5eb;overflow:auto;padding:18px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  .preview-stage{width:100%;display:flex;justify-content:center;align-items:flex-start}
  .preview-scale-wrap{position:relative}

  .quote-page{width:794px;min-height:1123px;background:#fff;color:#000;padding:16px 18px 18px;font-family:"Malgun Gothic",Arial,sans-serif}
  .quote-top-title{position:relative;height:64px;margin-bottom:10px}
  .quote-logo-wrap{position:absolute;left:6px;top:6px;height:52px;display:flex;align-items:center;justify-content:flex-start;max-width:220px}
  .quote-logo-wrap img{max-height:46px;max-width:210px;object-fit:contain}
  .quote-doc-title{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:34px;font-weight:800;letter-spacing:10px;white-space:nowrap}

  .quote-head-wrap{border:var(--outer) solid #000}
  .quote-head-grid{display:grid;grid-template-columns:39% 61%}
  .buyer-area{border-right:var(--outer) solid #000;display:flex;flex-direction:column;min-height:145px}
  .buyer-main{flex:1;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;text-align:center;line-height:1.4}
  .buyer-note{border-top:var(--inner) solid #000;padding:6px 8px;font-size:12px;text-align:left}

  .seller-table,.quote-name-row,.amount-row,.quote-table{width:100%;border-collapse:collapse;margin:0}
  .seller-table td,.seller-table th{border:var(--inner) solid #000;padding:6px 8px;font-size:13px;text-align:center;font-weight:700}
  .seller-table tr:first-child td,.seller-table tr:first-child th{border-top:none}
  .seller-table tr:last-child td,.seller-table tr:last-child th{border-bottom:none}
  .seller-table td:last-child,.seller-table th:last-child{border-right:none}
  .seller-table td:first-child,.seller-table th:first-child{border-left:none}
  .seller-table td.value{text-align:left;font-weight:600}
  .seller-table td.centerval{text-align:center;font-weight:600}

  .quote-name-row td{border-top:var(--outer) solid #000;border-bottom:var(--outer) solid #000;border-left:var(--inner) solid #000;border-right:var(--inner) solid #000;padding:7px 8px;font-size:14px;font-weight:700}
  .quote-name-row td:first-child{border-left:none}
  .quote-name-row td:last-child{border-right:none}
  .quote-name-row td.label{width:120px;background:#fff;text-align:center}
  .quote-name-row td.value{text-align:center}

  .amount-row td{border-top:none;border-bottom:var(--outer) solid #000;border-left:var(--inner) solid #000;border-right:var(--inner) solid #000;padding:7px 8px;font-size:14px;font-weight:700}
  .amount-row td:first-child{border-left:none}
  .amount-row td:last-child{border-right:none}
  .amount-row td.amount-text{text-align:center}
  .amount-row td.currency{width:55px;text-align:center}
  .amount-row td.amount-num{width:220px;text-align:right}

  .quote-body-wrap{border-left:var(--outer) solid #000;border-right:var(--outer) solid #000;border-bottom:var(--outer) solid #000}
  .quote-table th,.quote-table td{border:var(--inner) solid #000;padding:5px 4px;font-size:12px;text-align:center}
  .quote-table thead th{background:var(--lav);font-weight:800;border-top:none}
  .quote-table th:first-child,.quote-table td:first-child{border-left:none}
  .quote-table th:last-child,.quote-table td:last-child{border-right:none}
  .quote-table td.item-name{text-align:left;padding-left:8px}
  .quote-table td.item-remark{text-align:left;padding-left:8px}
  .quote-table td.item-img{padding:2px}
  .quote-table td.item-img img{width:62px;height:62px;object-fit:contain}
  .quote-table tbody tr.data-row td{height:40px}
  .quote-table tbody tr.blank-row td{height:52px}
  .discount-row td{font-weight:700;background:#f6f2f8}
  .discount-row td.rate-cell{font-size:16px;letter-spacing:.5px}
  .discount-row td.neg-amount{color:var(--neg);font-weight:800}
  .final-row td{font-weight:700;background:var(--lav)}
  .special-box{border-top:var(--inner) solid #000;min-height:78px}
  .special-title{padding:4px 8px;border-bottom:var(--inner) solid #000;font-weight:800;font-size:13px}
  .special-content{padding:8px 10px;font-size:13px;min-height:56px;white-space:pre-wrap}

  @media (max-width: 900px){
    .wrap{padding:14px}
    .title{font-size:30px;line-height:1.2}
    .toolbar{padding:14px}
    .panel{padding:14px}
    .result{grid-template-columns:1fr}
    .meta{font-size:16px;line-height:1.7}
    .quote-controls{align-items:stretch}
    .sum{text-align:left;font-size:18px}
  }

  @media (max-width: 768px){
    .toolbar{gap:10px}
    .field{min-width:100%;flex-basis:100%}
    .field label{font-size:13px}
    select,input,button,textarea{font-size:16px}
    .imgbox{height:210px}
    .actions{justify-content:stretch}
    .actions button{flex:1 1 calc(50% - 8px);min-width:0}
    .modal{padding:8px}
    .modal.show{align-items:stretch}
    .modal-box{height:calc(100vh - 16px);max-height:none;border-radius:14px}
    .modal-head{position:sticky;top:0;z-index:2;align-items:flex-start;flex-direction:column}
    .modal-actions{width:100%}
    .modal-actions button{flex:1 1 calc(50% - 4px)}
    .modal-body{padding:10px}

    #quoteTable{margin-top:0;border-collapse:separate;border-spacing:0 10px}
    #quoteTable thead{display:none}
    #quoteTable tbody{display:block}
    #quoteTable tr{display:block;background:#fff;border:1px solid #d9dde4;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:10px}
    #quoteTable td{display:grid;grid-template-columns:92px 1fr;gap:8px;align-items:center;border:none;border-bottom:1px solid #edf1f5;padding:10px 12px;text-align:left;font-size:14px}
    #quoteTable td:last-child{border-bottom:none}
    #quoteTable td::before{content:attr(data-label);font-weight:800;color:#506070}
    #quoteTable td.image-cell{grid-template-columns:1fr}
    #quoteTable td.image-cell::before{margin-bottom:6px}
    #quoteTable td.image-cell img{width:86px;height:86px}
    #quoteTable td.delete-cell{grid-template-columns:1fr}
    #quoteTable td.delete-cell button{width:100%}
    #quoteTable td.amount-cell{font-weight:800}
    .inline-input{min-width:0;font-size:16px}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">(주)더사가 견적 시스템</h1>

  <div class="toolbar">
    <div class="field">
      <label>분류 (필수)</label>
      <select id="category"><option value="">선택</option></select>
    </div>
    <div class="field">
      <label>규격</label>
      <select id="spec" disabled><option value="">선택</option></select>
    </div>
    <div class="field">
      <label>모델</label>
      <select id="model" disabled><option value="">선택</option></select>
    </div>
    <div class="field" style="min-width:260px">
      <label>견적서 수신처</label>
      <input type="text" id="receiver" placeholder="예: ○○학교장 / 홍길동" />
    </div>
    <div class="field" style="min-width:120px">
      <label>할인율(%)</label>
      <input type="number" id="discountRate" min="0" max="100" step="1" value="0" />
    </div>
    <div class="field" style="min-width:120px">
      <label>&nbsp;</label>
      <button id="searchBtn">조회</button>
    </div>
    <div class="field" style="min-width:120px">
      <label>&nbsp;</label>
      <button class="gray" id="resetBtn">초기화</button>
    </div>
  </div>

  <div class="panel">
    <h2 style="margin-top:0">조회 결과</h2>
    <div id="resultBox" class="empty">분류를 먼저 선택하세요.</div>
  </div>

  <div class="panel">
    <h2 style="margin-top:0">견적 리스트</h2>
    <div class="table-wrap">
      <table id="quoteTable">
        <thead>
          <tr>
            <th>이미지</th><th>분류</th><th>품명</th><th>모델</th><th>규격</th><th>식별번호</th><th>단가</th><th>수량</th><th>금액</th><th>삭제</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="quote-controls">
      <div>
        <button class="gray" id="addMiscBtn" type="button">기타 추가</button>
        <div class="misc-help">설치비, 운송비 등은 기타 항목으로 추가하고 상세 설명은 특이사항에 적으면 됩니다.</div>
      </div>
      <div class="sum" id="grandTotal">공급가 합계: 0원 / 할인금액: 0원 / 최종합계: 0원</div>
    </div>
    <div class="panel" style="margin-top:14px;padding:14px;background:#fafbfd">
      <div class="field" style="min-width:100%">
        <label>특이사항</label>
        <textarea id="specialNote" placeholder="예: 설치비 포함 / 운송비 별도 / 현장 반입 일정 협의"></textarea>
      </div>
    </div>
    <div class="actions">
      <button class="secondary" id="quoteBtn">견적서생성</button>
      <button class="orange" id="saveImageBtn">이미지저장</button>
      <button id="shareSavedBtn">이미지공유</button>
      <input type="file" id="shareFileInput" accept="image/*" style="display:none">
    </div>
  </div>
</div>

<div class="modal" id="previewModal">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title">견적서 미리보기</div>
      <div class="modal-actions">
        <button class="orange" id="modalSaveImageBtn">이미지 저장</button>
        <button class="gray" id="modalCloseBtn">닫기</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="preview-stage" id="previewStage">
        <div class="preview-scale-wrap" id="previewScaleWrap">
          <div id="previewContent"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const data = Array.isArray(window.THESAGA_DATA)
  ? window.THESAGA_DATA.filter(x => x && (x["분류"] || x["모델명"] || x["규격"]))
  : [];

const categorySel = document.getElementById('category');
const specSel = document.getElementById('spec');
const modelSel = document.getElementById('model');
const receiverInput = document.getElementById('receiver');
const discountRateInput = document.getElementById('discountRate');
const specialNoteInput = document.getElementById('specialNote');
const resultBox = document.getElementById('resultBox');
const quoteBody = document.querySelector('#quoteTable tbody');
const previewModal = document.getElementById('previewModal');
const previewContent = document.getElementById('previewContent');
const previewStage = document.getElementById('previewStage');
const previewScaleWrap = document.getElementById('previewScaleWrap');
const shareFileInput = document.getElementById('shareFileInput');
let lastSavedImageFile = null;

function num(v){
  if(v===null || v===undefined || v==='') return 0;
  const s = String(v).replace(/[^0-9.-]/g,'');
  return s ? Number(s) : 0;
}
function money(v){ return num(v).toLocaleString('ko-KR') + '원'; }
function moneyPlain(v){ return num(v).toLocaleString('ko-KR'); }
function uniq(arr){ return [...new Set(arr.filter(v => v !== null && v !== undefined && String(v).trim() !== ''))].sort(); }
function fillSelect(sel, values){
  sel.innerHTML = '<option value="">선택</option>';
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = String(v);
    opt.textContent = String(v);
    sel.appendChild(opt);
  });
}
function escapeHtml(value){
  return String(value ?? '').replace(/[&<>\"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function getImageUrl(item){
  let p = String(item["이미지경로"] || "");
  p = p.replace(/[\r\n\t]/g, '').trim();
  p = p.replace(/[\u200B-\u200D\uFEFF]/g, '');
  return p ? encodeURI(p.replace(/^\.?\//, '')) : '';
}
function getLogoUrl(){
  return encodeURI('logo/logo.png');
}
function getFilteredBase(){
  const c = categorySel.value;
  if(!c) return [];
  return data.filter(x => x["분류"] === c);
}

function refreshDependent(changedBy=''){
  const c = categorySel.value;
  if(!c){
    specSel.disabled = true;
    modelSel.disabled = true;
    fillSelect(specSel, []);
    fillSelect(modelSel, []);
    resultBox.innerHTML = '<div class="empty">분류를 먼저 선택하세요.</div>';
    return;
  }
  specSel.disabled = false;
  modelSel.disabled = false;

  const base = getFilteredBase();
  const currentSpec = specSel.value;
  const currentModel = modelSel.value;
  let specSource = base;
  let modelSource = base;
  if(currentModel) specSource = base.filter(x => String(x["모델명"] || '') === currentModel);
  if(currentSpec) modelSource = base.filter(x => String(x["규격"] || '') === currentSpec);

  const specOptions = uniq(specSource.map(x => String(x["규격"] || '')));
  const modelOptions = uniq(modelSource.map(x => String(x["모델명"] || '')));
  fillSelect(specSel, specOptions);
  fillSelect(modelSel, modelOptions);

  if(currentSpec && specOptions.includes(currentSpec)) specSel.value = currentSpec;
  if(currentModel && modelOptions.includes(currentModel)) modelSel.value = currentModel;
  if(changedBy === 'model' && specOptions.length === 1) specSel.value = specOptions[0];
  if(changedBy === 'spec' && modelOptions.length === 1) modelSel.value = modelOptions[0];
  autoDisplayIfSingle();
}

function getMatches(){
  const c = categorySel.value;
  const s = specSel.value;
  const m = modelSel.value;
  if(!c) return [];
  return data.filter(x => x["분류"] === c && (!s || String(x["규격"] || '') === s) && (!m || String(x["모델명"] || '') === m));
}

function renderResult(item){
  if(!item){
    resultBox.innerHTML = '<div class="empty">조건에 맞는 품목이 없습니다.</div>';
    return;
  }
  const imgUrl = getImageUrl(item);
  resultBox.innerHTML = `
    <div class="result">
      <div class="imgbox">${imgUrl ? `<img src="${imgUrl}" loading="lazy" onerror="this.style.display='none'">` : '<div class="empty">이미지 없음</div>'}</div>
      <div class="meta">
        <div><strong>분류</strong> ${escapeHtml(item["분류"] || '')}</div>
        <div><strong>품명</strong> ${escapeHtml(item["품명"] || '')}</div>
        <div><strong>모델</strong> ${escapeHtml(item["모델명"] || '')}</div>
        <div><strong>규격</strong> ${escapeHtml(item["규격"] || '')}</div>
        <div><strong>식별번호</strong> ${escapeHtml(item["식별번호"] || '')}</div>
        <div><strong>단가</strong> ${money(item["가격(원)"])}</div>
        <div style="margin-top:14px"><button onclick="addQuoteByCurrent()">견적 리스트에 추가</button></div>
      </div>
    </div>`;
}

function autoDisplayIfSingle(){
  const matches = getMatches();
  if(matches.length === 1) renderResult(matches[0]);
  else if(matches.length === 0 && categorySel.value) resultBox.innerHTML = '<div class="empty">조건에 맞는 품목이 없습니다.</div>';
  else if(matches.length > 1) resultBox.innerHTML = `<div class="empty">현재 조건으로 ${matches.length}건이 조회됩니다. 규격 또는 모델을 더 선택한 뒤 조회를 누르세요.</div>`;
}

function searchProduct(){
  if(!categorySel.value){
    alert('분류는 반드시 선택해야 합니다.');
    categorySel.focus();
    return;
  }
  const matches = getMatches();
  if(matches.length === 0) renderResult(null);
  else if(matches.length === 1) renderResult(matches[0]);
  else alert(`조건에 맞는 품목이 ${matches.length}건입니다. 규격 또는 모델을 추가로 선택해 주세요.`);
}

function addQuoteByCurrent(){
  const matches = getMatches();
  if(matches.length === 1) addToQuote(matches[0]);
  else alert('하나의 품목으로 좁혀진 뒤 추가할 수 있습니다.');
}
window.addQuoteByCurrent = addQuoteByCurrent;

function findExistingRowByKey(key){
  return [...quoteBody.querySelectorAll('tr')].find(tr => tr.dataset.key === key && tr.dataset.custom !== 'true');
}

function appendQuoteRow(tr){
  if(tr.dataset.custom === 'true'){
    quoteBody.appendChild(tr);
    return;
  }
  const firstCustom = quoteBody.querySelector('tr[data-custom="true"]');
  if(firstCustom) quoteBody.insertBefore(tr, firstCustom);
  else quoteBody.appendChild(tr);
}

function createRowHTML(item, price, qty, custom){
  const imgUrl = getImageUrl(item);
  const category = custom ? '기타' : (item['분류'] || '');
  const name = custom ? '기타' : (item['품명'] || '');
  const model = custom ? '-' : (item['모델명'] || '');
  const spec = custom ? '-' : (item['규격'] || '');
  const id = custom ? '-' : (item['식별번호'] || '');
  const amount = price * qty;

  return `
    <td class="image-cell" data-label="이미지">${imgUrl ? `<img class="quote-thumb" src="${imgUrl}" loading="lazy" onerror="this.style.display='none'">` : '<span class="empty">-</span>'}</td>
    <td data-label="분류" class="item-category">${escapeHtml(category)}</td>
    <td data-label="품명" class="item-name">${escapeHtml(name)}</td>
    <td data-label="모델" class="item-model">${escapeHtml(model)}</td>
    <td data-label="규격" class="item-spec">${escapeHtml(spec)}</td>
    <td data-label="식별번호" class="item-id">${escapeHtml(id)}</td>
    <td data-label="단가">
      <input class="unit-price inline-input" type="number" min="0" step="1" value="${price}">
    </td>
    <td data-label="수량">
      <input class="qty inline-input" type="number" min="1" step="1" value="${qty}">
    </td>
    <td data-label="금액" class="amount amount-cell">${money(amount)}</td>
    <td data-label="삭제" class="delete-cell"><button type="button" class="red" onclick="removeRow(this)">삭제</button></td>`;
}

function addToQuote(item, options = {}){
  const custom = !!options.custom;
  const key = custom ? `custom-${Date.now()}-${Math.random().toString(36).slice(2,7)}` : String(item['식별번호'] || item['모델명'] || Math.random());

  if(!custom){
    const existed = findExistingRowByKey(key);
    if(existed){
      const qtyInput = existed.querySelector('.qty');
      qtyInput.value = num(qtyInput.value) + 1;
      recalcRow(existed);
      return;
    }
  }

  const tr = document.createElement('tr');
  tr.dataset.key = key;
  if(custom) tr.dataset.custom = 'true';
  const price = Math.max(0, num(item['가격(원)']));
  const qty = 1;
  tr.innerHTML = createRowHTML(item, price, qty, custom);
  tr.querySelector('.unit-price').addEventListener('input', () => recalcRow(tr));
  tr.querySelector('.qty').addEventListener('input', () => recalcRow(tr));
  appendQuoteRow(tr);
  recalcRow(tr);
}

function addMiscItem(){
  addToQuote({ '분류':'기타', '품명':'기타', '모델명':'', '규격':'', '식별번호':'', '가격(원)':0, '이미지경로':'' }, { custom:true });
}

window.removeRow = function(btn){
  const row = btn.closest('tr');
  if(row) row.remove();
  recalcTotal();
};

function recalcRow(tr){
  const priceInput = tr.querySelector('.unit-price');
  const qtyInput = tr.querySelector('.qty');
  const price = Math.max(0, num(priceInput.value));
  const qty = Math.max(1, num(qtyInput.value));
  priceInput.value = String(price);
  qtyInput.value = String(qty);
  tr.querySelector('.amount').textContent = money(price * qty);
  recalcTotal();
}

function floorToTen(value){
  return Math.floor(num(value) / 10) * 10;
}

function recalcTotal(){
  const meta = getQuoteMeta();
  document.getElementById('grandTotal').textContent = `공급가 합계: ${money(meta.subtotal)} / 할인금액: ${money(meta.discountAmount)} / 최종합계: ${money(meta.finalTotal)}`;
}

function numberToKorean(value){
  const units = ['', '만', '억', '조'];
  const nums = ['', '일', '이', '삼', '사', '오', '육', '칠', '팔', '구'];
  const smallUnits = ['', '십', '백', '천'];
  let n = Math.floor(num(value));
  if(n === 0) return '영원';
  let result = '';
  let unitIndex = 0;
  while(n > 0){
    const part = n % 10000;
    if(part > 0){
      let partText = '';
      const digits = String(part).padStart(4, '0').split('').map(Number);
      digits.forEach((digit, idx) => {
        if(digit === 0) return;
        const pos = 3 - idx;
        partText += (digit === 1 && pos > 0 ? '' : nums[digit]) + smallUnits[pos];
      });
      result = partText + units[unitIndex] + result;
    }
    n = Math.floor(n / 10000);
    unitIndex += 1;
  }
  return result + '원';
}

function getQuoteMeta(){
  const rows = [...quoteBody.querySelectorAll('tr')].map(tr => {
    const img = tr.querySelector('img');
    const unitPrice = Math.max(0, num(tr.querySelector('.unit-price').value));
    const qty = Math.max(1, num(tr.querySelector('.qty').value));
    return {
      name: tr.querySelector('.item-name')?.textContent || '',
      category: tr.querySelector('.item-category')?.textContent || '',
      model: tr.querySelector('.item-model')?.textContent || '',
      spec: tr.querySelector('.item-spec')?.textContent || '',
      id: tr.querySelector('.item-id')?.textContent || '',
      unitPrice,
      qty,
      amount: unitPrice * qty,
      imgSrc: img ? img.src : ''
    };
  });

  const subtotal = rows.reduce((sum, r) => sum + r.amount, 0);
  const discountRate = Math.max(0, Math.min(100, num(discountRateInput.value)));
  const discountAmount = floorToTen(subtotal * discountRate / 100);
  const finalTotal = floorToTen(subtotal - discountAmount);
  const today = new Date();
  const weekday = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'][today.getDay()];
  return {
    rows,
    subtotal,
    discountRate,
    discountAmount,
    finalTotal,
    dateStr: `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 ${weekday}`,
    fileDate: `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}_${String(today.getHours()).padStart(2,'0')}${String(today.getMinutes()).padStart(2,'0')}${String(today.getSeconds()).padStart(2,'0')}`,
    receiver: (receiverInput.value || '').trim(),
    specialNote: (specialNoteInput.value || '').trim()
  };
}

function applyPreviewScale(){
  const capture = document.getElementById('quoteCaptureArea');
  if(!capture) return;
  const baseWidth = capture.offsetWidth || 794;
  const baseHeight = capture.offsetHeight || 1123;
  const availableWidth = Math.max(320, previewStage.clientWidth - 4);
  const scale = Math.min(1, availableWidth / baseWidth);
  previewScaleWrap.style.width = `${baseWidth * scale}px`;
  previewScaleWrap.style.height = `${baseHeight * scale}px`;
  capture.style.transformOrigin = 'top left';
  capture.style.transform = `scale(${scale})`;
}

function showPreview(){
  const html = buildQuotePreviewHTML();
  if(!html){
    alert('견적 리스트가 비어 있습니다.');
    return;
  }
  previewContent.innerHTML = html;
  previewModal.classList.add('show');
  document.body.classList.add('modal-open');
  requestAnimationFrame(() => {
    applyPreviewScale();
  });
}

function closePreview(){
  previewModal.classList.remove('show');
  document.body.classList.remove('modal-open');
}

async function waitForImages(root){
  const images = [...root.querySelectorAll('img')];
  await Promise.all(images.map(img => img.complete
    ? Promise.resolve()
    : new Promise(resolve => {
        img.onload = resolve;
        img.onerror = resolve;
      })
  ));
}

async function makePreviewImageFile(){
  const source = document.getElementById('quoteCaptureArea');
  if(!source){
    alert('먼저 견적서생성을 눌러 미리보기를 띄워 주세요.');
    return null;
  }

  const sandbox = document.createElement('div');
  sandbox.style.position = 'fixed';
  sandbox.style.left = '-10000px';
  sandbox.style.top = '0';
  sandbox.style.background = '#fff';
  sandbox.style.zIndex = '-1';
  document.body.appendChild(sandbox);

  const clone = source.cloneNode(true);
  clone.style.transform = 'none';
  clone.style.transformOrigin = 'top left';
  sandbox.appendChild(clone);

  try{
    await waitForImages(clone);
    const canvas = await html2canvas(clone, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 1.0));
    if(!blob) return null;
    const meta = getQuoteMeta();
    const file = new File([blob], `더사가_견적서_${meta.fileDate}.png`, { type: 'image/png' });
    lastSavedImageFile = file;
    return file;
  } finally {
    sandbox.remove();
  }
}

async function savePreviewImage(){
  if(!previewModal.classList.contains('show')) showPreview();
  const file = await makePreviewImageFile();
  if(!file) return;
  const url = URL.createObjectURL(file);
  const a = document.createElement('a');
  a.href = url;
  a.download = file.name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

async function shareSavedImage(){
  if(lastSavedImageFile && navigator.canShare && navigator.canShare({ files:[lastSavedImageFile] })){
    try {
      await navigator.share({ title:'더사가 견적서', files:[lastSavedImageFile] });
      return;
    } catch(err){
      if(err && err.name === 'AbortError') return;
    }
  }
  shareFileInput.value = '';
  shareFileInput.click();
}

async function shareSelectedFile(file){
  if(!file) return;
  if(navigator.canShare && navigator.canShare({ files:[file] })){
    try {
      await navigator.share({ title:'더사가 견적서', files:[file] });
      return;
    } catch(err){
      if(err && err.name === 'AbortError') return;
    }
  }
  alert('이 기기에서는 앱 공유가 제한됩니다. 저장된 이미지를 직접 첨부해 주세요.');
}

function resetAll(){
  categorySel.value = '';
  fillSelect(specSel, []);
  fillSelect(modelSel, []);
  specSel.disabled = true;
  modelSel.disabled = true;
  receiverInput.value = '';
  discountRateInput.value = '0';
  specialNoteInput.value = '';
  resultBox.innerHTML = '<div class="empty">분류를 먼저 선택하세요.</div>';
  quoteBody.innerHTML = '';
  recalcTotal();
}

function initCategory(){
  fillSelect(categorySel, uniq(data.map(x => x['분류'])));
  recalcTotal();
}

categorySel.addEventListener('change', () => {
  specSel.value = '';
  modelSel.value = '';
  refreshDependent('category');
});
specSel.addEventListener('change', () => refreshDependent('spec'));
modelSel.addEventListener('change', () => refreshDependent('model'));
discountRateInput.addEventListener('input', recalcTotal);
document.getElementById('searchBtn').addEventListener('click', searchProduct);
document.getElementById('resetBtn').addEventListener('click', resetAll);
document.getElementById('quoteBtn').addEventListener('click', showPreview);
document.getElementById('saveImageBtn').addEventListener('click', savePreviewImage);
document.getElementById('modalSaveImageBtn').addEventListener('click', savePreviewImage);
document.getElementById('shareSavedBtn').addEventListener('click', shareSavedImage);
document.getElementById('modalCloseBtn').addEventListener('click', closePreview);
document.getElementById('addMiscBtn').addEventListener('click', addMiscItem);
previewModal.addEventListener('click', e => { if(e.target === previewModal) closePreview(); });
shareFileInput.addEventListener('change', async e => {
  const file = e.target.files && e.target.files[0];
  await shareSelectedFile(file);
});
window.addEventListener('resize', () => {
  if(previewModal.classList.contains('show')) applyPreviewScale();
});
initCategory();
</script>
